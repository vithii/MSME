<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | MSMEgrowth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px; font-weight: 500; line-height: 1.5; transition: all 0.3s ease;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        .main-view {
            flex-grow: 1;
            margin-left: 260px;
            padding: 0;
            padding-bottom: 120px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 90;
        }



        .sales-hero {
            padding: 24px 48px 24px 48px;
            text-align: center;
        }

        .headline {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .subheadline {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            margin: 0 auto 16px auto;
            max-width: 800px;
        }

        /* 3 TALL VERTICAL CARDS (The exact mockup layout) */
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto 40px auto;
            padding: 0 24px;
        }

        .package-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s ease;
        }

        .package-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 163, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,163,255,0.1);
        }

        .package-card.popular {
            background: linear-gradient(180deg, rgba(6, 217, 160, 0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid var(--secondary);
            transform: scale(1.05);
            z-index: 2;
        }

        .package-card.popular:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(6, 217, 160, 0.2);
        }

        .popular-badge {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: #000;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(6, 217, 160, 0.4);
        }

        .discount-badge {
            display: inline-block;
            background: rgba(255,0,85,0.1);
            color: #ff0055;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 16px;
            border: 1px solid rgba(255,0,85,0.2);
        }

        .package-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
        }

        .btn-sales {
            background: linear-gradient(90deg, var(--primary), #0077ff);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 163, 255, 0.2);
        }

        .btn-sales:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 163, 255, 0.4);
        }
        
        .btn-sales.secondary {
            background: linear-gradient(90deg, var(--secondary), #00b386);
            color: #000;
            box-shadow: 0 10px 20px rgba(6, 217, 160, 0.2);
        }

        .btn-sales.secondary:hover {
            box-shadow: 0 15px 30px rgba(6, 217, 160, 0.4);
        }

        .urgency-text {
            text-align: center;
            font-size: 0.8rem;
            color: #ff3300;
            margin-top: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Lists */
        .sales-list {
            list-style: none;
            padding: 0;
            margin: 32px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sales-list li {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-weight: 500;
        }
        
        .sales-list li.dim {
            color: rgba(255,255,255,0.4);
        }
        .sales-list li.dim span {
            opacity: 0.3;
        }

        /* Portfolio */
        .portfolio-section {
            padding: 0 48px 80px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .portfolio-item {
            height: 250px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        
        .portfolio-item::after {
            content: '▶ PLAY SHOWREEL';
            position: absolute;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0;
            transition: 0.3s ease;
        }
        
        .portfolio-item:hover::after {
            opacity: 1;
        }

        .guarantee-box {
            background: rgba(6, 217, 160, 0.05);
            border: 1px solid rgba(6, 217, 160, 0.2);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto 80px auto;
        }

        /* NEW SALES PAGE SECTIONS */
        .benefits-list {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        
        .social-proof-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 32px;
            margin-bottom: 80px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-num {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .featured-video {
            max-width: 900px;
            margin: 0 auto 80px auto;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .timeline {
            max-width: 800px;
            margin: 0 auto 80px auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .timeline-step {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.02);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .step-num {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: rgba(0, 163, 255, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            flex-shrink: 0;
            border: 2px solid var(--primary);
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto 80px auto;
        }
        .testimonial-card {
            background: rgba(255,255,255,0.02);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stars {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto 80px auto;
        }
        .faq-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 24px;
        }
        .faq-q {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .faq-a {
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        .final-cta {
            background: linear-gradient(180deg, rgba(0,163,255,0.05) 0%, rgba(10,10,15,1) 100%);
            text-align: center;
            padding: 80px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Portfolio / Sample Videos Section */
        .portfolio-section {
            max-width: 1000px;
            margin: 80px auto;
            padding: 0 24px;
        }
        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }
        .portfolio-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 163, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }
        .portfolio-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 163, 255, 0.1) 0%, rgba(6, 217, 160, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        .portfolio-item:hover::before {
            opacity: 1;
        }

            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="index.html" class="nav-logo" style="margin-bottom: 24px; display: block;">MSME<span style="color: var(--primary);">growth</span></a>
            
            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Active Dashboard
                </a>
                <a href="services.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Service Catalog
                </a>
                <a href="courses.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg> My Masterclasses
                </a>
                <a href="messages.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages 
                </a>
            </nav>

            <a href="#" class="nav-item" style="margin-bottom: 0;" onclick="firebase.auth().signOut().then(() => window.location.href='login.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sign Out
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view" id="main-content" style="display: none;">
            
            <div class="top-bar" style="padding: 16px 48px;">
                <a href="services.html" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem; border-color: rgba(255,255,255,0.1); color: var(--text-muted);">← Back</a>
                <div class="user-profile">
                    <div style="text-align: right;">
                        <div style="font-weight: 600; font-size: 0.85rem;" id="profile-name">Client Name</div>
                    </div>
                    <div class="avatar" id="profile-avatar" style="width: 32px; height: 32px; font-size: 0.85rem;">C</div>
                </div>
            </div>

            <div id="dynamic-container">
                <!-- Javascript will inject everything here -->
            </div>

        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/services-data.js"></script>
    
    <script>
        const profileName = document.getElementById('profile-name');
        const profileAvatar = document.getElementById('profile-avatar');
        const mainContent = document.getElementById('main-content');
        const dynamicContainer = document.getElementById('dynamic-container');

        // Extract ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = urlParams.get('id');
        const service = servicesData[serviceId];

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.name) {
                            const firstName = userData.name.split(' ')[0];
                            if(profileName) profileName.innerText = userData.name;
                            if(profileAvatar) profileAvatar.innerText = firstName.charAt(0).toUpperCase();
                        }
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        if (!service) {
            dynamicContainer.innerHTML = `<h1 style="text-align:center; padding: 100px; color: var(--text-muted); font-weight: 500;">Service not found.</h1>`;
            mainContent.style.display = 'block';
        } else {
            
            // Build the 3 tall cards based on the packages array
            let cardsHtml = '';
            service.packages.forEach((pkg, index) => {
                const isPopular = index === 1; // Middle package is the sweet spot
                
                cardsHtml += `
                    <div class="package-card ${isPopular ? 'popular' : ''}">
                        ${isPopular ? '<div class="popular-badge">Most Popular</div>' : ''}
                        <h3 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; color: ${isPopular ? 'var(--secondary)' : '#fff'}; text-align: center;">${pkg.title}</h3>
                        ${pkg.badge ? `<div class="discount-badge" style="margin: 0 auto 12px auto; display: table;">${pkg.badge} SAVINGS</div>` : ''}
                        
                        <div class="package-price" style="font-size: 2.2rem; text-align: center;">${pkg.price}</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 32px; text-align: center;">⚡ Delivered in ${pkg.delivery}</div>

                        <div style="margin-top: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
                            <span style="font-size: 1.1rem; font-weight: 900; color: #fff;">${pkg.costPer}</span>
                        </div>

                        <!-- BUY BUTTON RESTORED TO BOTTOM -->
                        <button class="btn-sales ${isPopular ? 'secondary' : ''}" style="margin-top: 24px;" onclick="window.location.href='checkout.html?service=${service.id}&pkg=${index}'">
                            Start My Project
                        </button>
                    </div>
                `;
            });

            // Build Page Layout
            let html = `
                <!-- 1. Sales Hero -->
                <div class="sales-hero" style="padding-top: 40px; margin-bottom: 24px;">
                    <div style="font-size: 3rem; margin-bottom: 16px;">${service.icon}</div>
                    <h1 class="headline" style="max-width: 900px; margin: 0 auto 24px auto;">${service.heroHeadline}</h1>
                    <p class="subheadline" style="font-size: 1.1rem;">${service.description}</p>
                    
                    <div class="benefits-list">
                        ${service.benefits.map(b => `
                            <div class="benefit-item">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                ${b}
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- 2. Social Proof Bar -->
                <div class="social-proof-bar">
                    <div class="stat-box">
                        <div class="stat-num">45+</div>
                        <div class="stat-label">Businesses Scaled</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">250+</div>
                        <div class="stat-label">Assets Delivered</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">98%</div>
                        <div class="stat-label">Client Satisfaction</div>
                    </div>
                </div>

                <!-- 3. Featured Video Placeholder -->
                <div class="featured-video" onclick="alert('Playing featured showcase...')">
                    <div style="text-align: center; color: rgba(255,255,255,0.8);">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                        <h3 style="font-size: 1.5rem; font-weight: 700;">Watch The Showreel</h3>

                <div class="portfolio-section" id="portfolio">
                    <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 16px; text-align: center;">See Previous Works & Case Studies</h2>

                <div class="testimonials">
                    <div class="testimonial-card">
                        <div class="stars">★★★★★</div>

                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 40px; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.1);"></div>
                            <div>

                                <div style="font-size: 0.8rem; color: var(--text-muted);">E-commerce Founder</div>

                        <div class="stars">★★★★★</div>

                    ${service.faqs.map(f => `

                            <div class="faq-q">${f.q}</div>
                            <div class="faq-a">${f.a}</div>

                    `).join('')}
                </div>

                <!-- 10. Guarantee -->
                <div class="guarantee-box">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 24px; color: var(--secondary);">100% Iron-Clad Quality Guarantee</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: left; max-width: 600px; margin: 0 auto;">
                        <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Unlimited Minor Revisions</div>
                        <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Dedicated Project Manager</div>

                <!-- 11. Final CTA -->
                <div class="final-cta">
                    <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(255,51,0,0.1); color: #ff3300; padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 24px; border: 1px solid rgba(255,51,0,0.2);">
                        🔥 High Demand: Only 4 Production Slots Left This Week
                    </div>
                    <h2 style="font-size: 3rem; font-weight: 900; margin-bottom: 16px; color: #fff;">Ready to Scale?</h2>
                    <p style="font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 32px auto;">Select a package above and secure your slot before we reach full capacity.</p>
                    <button class="btn-sales" style="max-width: 300px; padding: 20px 40px;" onclick="window.scrollTo({top: 500, behavior: 'smooth'})">Start My Project</button>
                    
                    <div style="margin-top: 48px; padding-top: 48px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: rgba(255,255,255,0.3); display: flex; justify-content: space-between; align-items: center;">

            `;
            dynamicContainer.innerHTML = html;
            mainContent.style.display = 'block';

            // Query configured videos from Firestore
            firebase.firestore().collection('videos').doc(serviceId).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    updateVideosOnPage(data);
                }
            }).catch(err => console.error("Error fetching videos:", err));
        }

        function updateVideosOnPage(data) {
            // Update Sales Video
            if (data.salesVideoUrl) {
                const featuredVideoContainer = document.querySelector('.featured-video');
                if (featuredVideoContainer) {
                    const embedUrl = getGoogleDriveEmbedUrl(data.salesVideoUrl);
                    const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                    
                    // Replace the contents immediately with the iframe and the invisible overlay to block pop-out
                    featuredVideoContainer.innerHTML = `
                        <iframe src="${finalEmbedUrl}" style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <!-- Invisible overlay to block Google Drive pop-out button -->
                        <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                    `;
                    // Remove click handler since it autoplays
                    featuredVideoContainer.onclick = null;
                }
            }
            
            // Update Sample / Portfolio Videos
            if (data.samples && data.samples.length > 0) {
                const portfolioGallery = document.querySelector('.portfolio-gallery');
                if (portfolioGallery) {
                    let portfolioHtml = '';
                    data.samples.forEach((sample, idx) => {
                        const thumbnailUrl = getGoogleDriveThumbnailUrl(sample.url);
                        const backgroundStyle = thumbnailUrl 
                            ? `background: linear-gradient(180deg, rgba(10, 14, 23, 0.4) 0%, rgba(10, 14, 23, 0.95) 100%), url('${thumbnailUrl}'); background-size: cover; background-position: center;`
                            : 'background: rgba(255, 255, 255, 0.02);';
                        
                        portfolioHtml += `
                            <div class="portfolio-item card glass" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 180px; padding: 24px; position: relative; overflow: hidden; transition: all 0.3s; ${backgroundStyle}" onclick="playSampleVideoModal('${sample.title.replace(/'/g, "\\'")}', '${sample.url}')">
                                <div style="font-size: 2.5rem; margin-bottom: 12px; z-index: 2; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">🎬</div>
                                <h4 style="font-size: 1.1rem; font-weight: 700; color: #fff; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">${sample.title || `Sample Video ${idx + 1}`}</h4>
                                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; z-index: 2; text-shadow: 0 1px 2px rgba(0,0,0,0.8);">Click to Watch</p>
                                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,163,255,0.05); z-index: 1;"></div>
                            </div>
                        `;
                    });
                    portfolioGallery.innerHTML = portfolioHtml;
                }
            }
        }

        function pauseSalesPageVideo() {
            const featuredVideoContainer = document.querySelector('.featured-video');
            if (featuredVideoContainer) {
                const iframe = featuredVideoContainer.querySelector('iframe');
                if (iframe) {
                    iframe.src = iframe.src;
                }
            }
        }

        function playSampleVideoModal(title, url) {
            pauseSalesPageVideo(); // Pause sales video first
            
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                const embedUrl = getGoogleDriveEmbedUrl(url);
                const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                container.innerHTML = `
                    <div style="position: relative; width: 100%; height: 100%; padding: 0; margin: 0; overflow: hidden;">
                        <iframe src="${finalEmbedUrl}" style="width: 100%; height: 100%; border: none; margin: 0; padding: 0; display: block;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <!-- Invisible overlay to block Google Drive pop-out button -->
                        <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                    </div>
                `;
                modal.style.display = 'flex';
            }
        }

        function closeVideoPlayerModal() {
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                container.innerHTML = '';
                modal.style.display = 'none';
            }
        }

        // Close on clicking outside the modal content
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('videoPlayerModal');
            if (modal) {
                modal.onclick = function(e) {
                    if (e.target === this) {
                        closeVideoPlayerModal();
                    }
                };
            }
        });
    </script>

    <!-- Video Player Modal -->
    <div class="modal-overlay" id="videoPlayerModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); margin: 0; padding: 0;">
        <div style="position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: 0; padding: 0;">
            <button onclick="closeVideoPlayerModal()" style="position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 2rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1010; transition: background 0.3s; line-height: 1;">×</button>
            <div id="modal-video-container" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;"></div>
        </div>
    </div>
</body>
