<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | MSMEgrowth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .main-view-full {
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .main-view {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0;
            padding-bottom: 120px;
        }

        .sales-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 48px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .nav-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-back:hover {
            color: #fff;
        }



        .sales-hero {
            padding: 24px 48px 24px 48px;
            text-align: center;
        }

        .headline {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .subheadline {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        /* Fiverr 2-Column Split & Sticky Sidebar Layout */
        .sales-layout-container {
            display: flex;
            gap: 48px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            align-items: flex-start;
        }

        .sales-left-col {
            flex: 1;
            min-width: 0;
        }

        .sales-right-col {
            width: 380px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            z-index: 10;
        }

        .fiverr-widget {
            background: rgba(18, 18, 29, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
        }

        .fiverr-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fiverr-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 16px 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 3px solid transparent;
        }

        .fiverr-tab.active {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.02);
            border-bottom-color: var(--primary);
        }

        .fiverr-widget-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 280px;
            box-sizing: border-box;
        }

        .fiverr-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .fiverr-price {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        .fiverr-cost-per {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 700;
        }

        .fiverr-delivery-badge {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fiverr-continue-btn {
            background: var(--gradient-brand);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 163, 255, 0.2);
        }

        .fiverr-continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 163, 255, 0.4);
        }

        @media (max-width: 768px) {
            .sales-layout-container {
                flex-direction: column;
                gap: 24px;
                padding: 16px;
            }
            .sales-left-col {
                width: 100%;
            }
            .sales-right-col {
                width: 100%;
                position: static;
            }
        }

        .package-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s ease;
        }

        .package-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 163, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,163,255,0.1);
        }

        .package-card.popular {
            background: linear-gradient(180deg, rgba(6, 217, 160, 0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid var(--secondary);
            transform: scale(1.05);
            z-index: 2;
        }

        .package-card.popular:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(6, 217, 160, 0.2);
        }

        .popular-badge {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: #000;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(6, 217, 160, 0.4);
        }

        .discount-badge {
            display: inline-block;
            background: rgba(255,0,85,0.1);
            color: #ff0055;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 16px;
            border: 1px solid rgba(255,0,85,0.2);
        }

        .package-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
        }

        .btn-sales {
            background: linear-gradient(90deg, var(--primary), #0077ff);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 163, 255, 0.2);
        }

        .btn-sales:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 163, 255, 0.4);
        }
        
        .btn-sales.secondary {
            background: linear-gradient(90deg, var(--secondary), #00b386);
            color: #000;
            box-shadow: 0 10px 20px rgba(6, 217, 160, 0.2);
        }

        .btn-sales.secondary:hover {
            box-shadow: 0 15px 30px rgba(6, 217, 160, 0.4);
        }

        .urgency-text {
            text-align: center;
            font-size: 0.8rem;
            color: #ff3300;
            margin-top: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Lists */
        .sales-list {
            list-style: none;
            padding: 0;
            margin: 32px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sales-list li {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-weight: 500;
        }
        
        .sales-list li.dim {
            color: rgba(255,255,255,0.4);
        }
        .sales-list li.dim span {
            opacity: 0.3;
        }

        /* Portfolio */
        .portfolio-section {
            padding: 0 48px 80px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .portfolio-item {
            height: 250px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        .portfolio-item:hover .play-btn {
            transform: translate(-50%, -50%) scale(1.15);
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.6);
        }


        .guarantee-box {
            background: rgba(6, 217, 160, 0.05);
            border: 1px solid rgba(6, 217, 160, 0.2);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto 80px auto;
        }

        /* NEW SALES PAGE SECTIONS */
        .benefits-list {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
        }
        
        .social-proof-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 32px;
            margin-bottom: 80px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-num {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .featured-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .featured-video:hover {
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 40px rgba(0, 163, 255, 0.1);
        }
        .featured-video .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            transition: transform 0.5s ease;
            z-index: 1;
        }
        .featured-video:hover .video-bg {
            transform: scale(1.05);
        }
        .featured-video .play-btn-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 163, 255, 0.15);
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.3);
            z-index: 2;
        }
        .featured-video:hover .play-btn-large {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 163, 255, 0.6);
        }

        .timeline {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 48px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0.25;
            z-index: 1;
        }
        .timeline-step {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            z-index: 2;
        }
        .step-num {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0a0e17; /* Solid background matching body to mask the timeline line */
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            flex-shrink: 0;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 163, 255, 0.2);
            transition: all 0.3s ease;
        }
        .timeline-step:hover .step-num {
            transform: scale(1.1);
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 20px rgba(6, 217, 160, 0.4);
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto 80px auto;
        }
        .testimonial-card {
            background: rgba(255,255,255,0.02);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stars {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto 80px auto;
        }
        .faq-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 24px;
        }
        .faq-q {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .faq-a {
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        .final-cta {
            background: linear-gradient(180deg, rgba(0,163,255,0.05) 0%, rgba(10,10,15,1) 100%);
            text-align: center;
            padding: 80px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Portfolio / Sample Videos Section */
        .portfolio-section {
            max-width: 1000px;
            margin: 80px auto;
            padding: 0 24px;
        }
        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }
        .portfolio-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 163, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }
        .portfolio-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 163, 255, 0.1) 0%, rgba(6, 217, 160, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        .portfolio-item:hover::before {
            opacity: 1;
        }

        .main-view {
            padding: 24px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sales-header {
                padding: 20px 24px !important;
            }
            .main-view {
                padding: 16px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            .timeline {
                flex-direction: column !important;
                gap: 24px !important;
            }
            .timeline::before {
                top: 20px !important;
                bottom: 20px !important;
                left: 20px !important;
                right: auto !important;
                width: 2px !important;
                height: auto !important;
            }
            .timeline-step {
                flex-direction: row !important;
                text-align: left !important;
                align-items: center !important;
                gap: 16px !important;
                padding: 0 !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-view-full auth-loading" id="dashboard-layout">
        
        <!-- Distraction-free Header -->
        <header class="sales-header">
            <a href="index.html" class="nav-logo">MSME<span style="color: var(--primary);">growth</span></a>
            <div style="display: flex; align-items: center; gap: 24px;">
                <a href="services.html" class="nav-back">← Back to Portal</a>
                <div id="topbar-user-profile" style="display: flex; align-items: center; gap: 12px;">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-view" id="main-content" style="display: none;">
            <div id="dynamic-container">
                <!-- Javascript will inject everything here -->
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/services-data.js"></script>
    
    <script>
        const topbarUserProfile = document.getElementById('topbar-user-profile');
        const mainContent = document.getElementById('main-content');
        const dynamicContainer = document.getElementById('dynamic-container');

        // Extract ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = urlParams.get('id');
        const service = servicesData[serviceId];

        firebase.auth().onAuthStateChanged(async (user) => {
            const layout = document.getElementById('dashboard-layout');
            if (layout) layout.classList.remove('auth-loading');
            if (typeof hideAuthLoader === 'function') hideAuthLoader();
            if (mainContent) mainContent.style.display = 'block';

            if (user) {
                try {
                    const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
                    let name = user.email;
                    let initial = "C";
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.name) {
                            name = userData.name;
                            initial = name.charAt(0).toUpperCase();
                        }
                    }
                    if (topbarUserProfile) {
                        topbarUserProfile.innerHTML = `
                            <div style="text-align: right;">
                                <div style="font-weight: 600; font-size: 0.95rem; color: #fff;">${name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">Client Account</div>
                            </div>
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-brand); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,163,255,0.25);">${initial}</div>
                        `;
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                if (topbarUserProfile) {
                    topbarUserProfile.innerHTML = `
                        <a href="login.html?redirect=${encodeURIComponent(window.location.href)}" class="btn" style="background: var(--gradient-brand); color: #fff; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; text-decoration: none; border: none; box-shadow: 0 4px 10px rgba(0,163,255,0.25);">Sign In</a>
                    `;
                }
            }
        });        let activePkgIndex = 0;
        function renderFiverrPackageWidget() {
            const sidebarContainer = document.getElementById('fiverr-package-sidebar');
            if (!sidebarContainer) return;

            let tabsHtml = '';
            service.packages.forEach((pkg, index) => {
                const tabLabel = pkg.badge ? `${pkg.title} (${pkg.badge})` : pkg.title;
                tabsHtml += `
                    <button class="fiverr-tab ${index === activePkgIndex ? 'active' : ''}" onclick="switchFiverrTab(${index})">
                        ${tabLabel}
                    </button>
                `;
            });

            const pkg = service.packages[activePkgIndex];
            
            // Calculate dynamic slash price comparison
            const basePriceText = service.packages[0].price;
            const basePriceNum = parseFloat(basePriceText.replace(/[^0-9]/g, ''));
            const baseQty = parseInt(service.packages[0].title) || 1;
            const basePricePerUnit = basePriceNum / baseQty;

            const qty = parseInt(pkg.title) || 1;
            const originalPriceNum = Math.round(basePricePerUnit * qty);
            const originalPriceFormatted = "LKR " + originalPriceNum.toLocaleString();

                <div class="fiverr-widget">

                        <!-- Portfolio / Gallery -->

                            <p style="text-align: left; color: var(--text-muted); margin-bottom: 32px;">Proof is in the profit. See how we've scaled brands exactly like yours.</p>

                                    <p style="font-size: 1.05rem; color: rgba(255,255,255,0.9); line-height: 1.6; margin-bottom: 24px; font-style: italic;">"Absolutely incredible. They delivered the assets 2 days early and the quality completely blew our competitors out of the water. Our ad costs dropped by 40% immediately."</p>
                                    <div style="display: flex; align-items: center; gap: 12px;">

                                    <div style="display: flex; align-items: center; gap: 12px;">

                        <div style="margin-bottom: 48px;">

                            <div class="faq-container" style="max-width: 100%; margin: 0 0 48px 0;">
                                ${service.faqs.map(f => `
                                    <div class="faq-item">
                                        <div class="faq-q">${f.q}</div>
                                        <div class="faq-a">${f.a}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Guarantee -->
                        <div class="guarantee-box" style="text-align: left; margin: 0 0 48px 0; padding: 32px;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 24px; color: var(--secondary);">100% Quality Guarantee</h2>

                                <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Dedicated Project Manager</div>

                    </div>

            dynamicContainer.innerHTML = html;
            renderFiverrPackageWidget();
            mainContent.style.display = 'block';

            // Query configured videos from Firestore
            firebase.firestore().collection('videos').doc(serviceId).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    updateVideosOnPage(data);
                }
            }).catch(err => console.error("Error fetching videos:", err));
        }

        function updateVideosOnPage(data) {
            // Update Sales Video
            if (data.salesVideoUrl) {
                const featuredVideoContainer = document.querySelector('.featured-video');
                if (featuredVideoContainer) {
                    const embedUrl = getGoogleDriveEmbedUrl(data.salesVideoUrl);
                    const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                    
                    // Update preview card background using Google Drive thumbnail
                    const thumbnailUrl = getGoogleDriveThumbnailUrl(data.salesVideoUrl);
                    if (thumbnailUrl) {
                        const videoBg = featuredVideoContainer.querySelector('.video-bg');
                        if (videoBg) {
                            videoBg.style.backgroundImage = `linear-gradient(180deg, rgba(10,14,23,0.3) 0%, rgba(10,14,23,0.9) 100%), url('${thumbnailUrl}')`;
                        }
                    }
                    
                    // Add click handler to play video inline on click
                    featuredVideoContainer.onclick = function() {
                        featuredVideoContainer.innerHTML = `
                            <iframe src="${finalEmbedUrl}" style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                            <!-- Invisible overlay to block Google Drive pop-out button -->
                            <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                        `;
                        featuredVideoContainer.onclick = null;
                    };
                }
            }
            
            // Update Sample / Portfolio Videos
            if (data.samples && data.samples.length > 0) {
                const portfolioGallery = document.querySelector('.portfolio-gallery');
                if (portfolioGallery) {
                    let portfolioHtml = '';
                    data.samples.forEach((sample, idx) => {
                        const thumbnailUrl = getGoogleDriveThumbnailUrl(sample.url);
                        const backgroundStyle = thumbnailUrl 
                            ? `background: linear-gradient(180deg, rgba(10, 14, 23, 0.2) 0%, rgba(10, 14, 23, 0.8) 100%), url('${thumbnailUrl}'); background-size: cover; background-position: center;`
                            : 'background: rgba(255, 255, 255, 0.02);';
                        
                        portfolioHtml += `
                            <div class="portfolio-item card glass" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 180px; padding: 0; position: relative; overflow: hidden; transition: all 0.3s; ${backgroundStyle}" onclick="playSampleVideoModal('${sample.title.replace(/'/g, "\\'")}', '${sample.url}')">
                                <div class="play-btn" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; border: 1px solid rgba(255,255,255,0.25); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.4);">

                                </div>
                                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,163,255,0.03); z-index: 1;"></div>
                            </div>
                        `;
                    });
                    portfolioGallery.innerHTML = portfolioHtml;
                }
            }
        }

        function pauseSalesPageVideo() {
            const featuredVideoContainer = document.querySelector('.featured-video');
            if (featuredVideoContainer) {
                const iframe = featuredVideoContainer.querySelector('iframe');
                if (iframe) {
                    let src = iframe.src;
                    if (src.includes('autoplay=1')) {
                        src = src.replace('autoplay=1', 'autoplay=0');
                    } else if (!src.includes('autoplay=')) {
                        src = src + (src.includes('?') ? '&' : '?') + 'autoplay=0';
                    }
                    iframe.src = src;
                }
            }
        }

        function playSampleVideoModal(title, url) {
            pauseSalesPageVideo(); // Pause sales video first
            
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                const embedUrl = getGoogleDriveEmbedUrl(url);
                const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                container.innerHTML = `
                    <div style="position: relative; width: 100%; height: 100%; padding: 0; margin: 0; overflow: hidden;">
                        <iframe src="${finalEmbedUrl}" style="width: 100%; height: 100%; border: none; margin: 0; padding: 0; display: block;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <!-- Invisible overlay to block Google Drive pop-out button -->
                        <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                    </div>
                `;
                modal.style.display = 'flex';
            }
        }

        function closeVideoPlayerModal() {
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                container.innerHTML = '';
                modal.style.display = 'none';
            }
        }

        // Close on clicking outside the modal content
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('videoPlayerModal');
            if (modal) {
                modal.onclick = function(e) {
                    if (e.target === this) {
                        closeVideoPlayerModal();
                    }
                };
            }
        });
    </script>

    <!-- Video Player Modal -->
    <div class="modal-overlay" id="videoPlayerModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); margin: 0; padding: 0;">
        <div style="position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: 0; padding: 0;">
            <button onclick="closeVideoPlayerModal()" style="position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 2rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1010; transition: background 0.3s; line-height: 1;">×</button>
            <div id="modal-video-container" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;"></div>
        </div>
    </div>
