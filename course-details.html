<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterclass Details | MSMEgrowth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .main-view-full {
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .sales-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 48px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .nav-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-back:hover {
            color: #fff;
        }

        .sales-hero {
            padding: 64px 24px 40px 24px;
            text-align: center;
        }

        .headline {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 24px;
            color: #fff;
            line-height: 1.15;
            letter-spacing: -1px;
        }

        .subheadline {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        .benefits-list {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
        }

        /* Video Showcase */
        .featured-video {
            max-width: 850px;
            margin: 48px auto;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 50px rgba(0, 163, 255, 0.1);
        }

        /* Fiverr 2-Column Split & Sticky Sidebar Layout */
        .sales-layout-container {
            display: flex;
            gap: 48px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            align-items: flex-start;
        }

        .sales-left-col {
            flex: 1;
            min-width: 0;
        }

        .sales-right-col {
            width: 380px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            z-index: 10;
        }

        .fiverr-widget {
            background: rgba(18, 18, 29, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
        }

        .fiverr-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fiverr-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 16px 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 3px solid transparent;
        }

        .fiverr-tab.active {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.02);
            border-bottom-color: var(--primary);
        }

        .fiverr-widget-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 280px;
            box-sizing: border-box;
        }

        .fiverr-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .fiverr-price {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        .fiverr-cost-per {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 700;
        }

        .fiverr-delivery-badge {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fiverr-continue-btn {
            background: var(--gradient-brand);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 163, 255, 0.2);
        }

        .fiverr-continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 163, 255, 0.4);
        }

        @media (max-width: 768px) {
            .sales-layout-container {
                flex-direction: column;
                gap: 24px;
                padding: 16px;
            }
            .sales-left-col {
                width: 100%;
            }
            .sales-right-col {
                width: 100%;
                position: static;
            }
        }

        .package-card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--secondary);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 40px rgba(6, 217, 160, 0.08);
        }

        .package-price {
            font-size: 3rem;
            font-weight: 900;
            color: var(--secondary);
            text-align: center;
        }

        .btn-sales {
            width: 100%;
            background: var(--gradient-brand);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.15rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(6, 217, 160, 0.2);
        }

        .btn-sales:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(6, 217, 160, 0.35);
        }

        /* Before / After and Contents Styles */
        .comparison-section {
            max-width: 900px;
            margin: 80px auto;
            padding: 0 24px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 32px;
        }

        .comparison-card {
            padding: 32px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .comparison-card.before {
            background: rgba(255, 71, 87, 0.01);
            border-color: rgba(255, 71, 87, 0.08);
        }

        .comparison-card.after {
            background: rgba(6, 217, 160, 0.01);
            border-color: rgba(6, 217, 160, 0.08);
        }

        .faq-section {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 24px;
        }

        .faq-item {
            margin-bottom: 24px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 24px;
        }

        .faq-q {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .faq-a {
            color: var(--text-muted);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .sales-header {
                padding: 20px 24px;
            }
            .comparison-grid {
                grid-template-columns: 1fr;
            }
            .headline {
                font-size: 2.2rem;
            }
        }

        /* Portfolio / Sample Videos Section */
        .portfolio-section {
            max-width: 1000px;
            margin: 80px auto;
            padding: 0 24px;
        }
        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }
        .portfolio-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 163, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }
        .portfolio-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 163, 255, 0.1) 0%, rgba(6, 217, 160, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        .portfolio-item:hover::before {
            opacity: 1;
        }
        .portfolio-item:hover .play-btn {
            transform: translate(-50%, -50%) scale(1.15);
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.6);
        }


            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            margin-left: 250px !important;
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-view-full auth-loading" id="dashboard-layout">
        
        <!-- Distraction-free Header -->
        <header class="sales-header">
            <a href="index.html" class="nav-logo">MSME<span style="color: var(--primary);">growth</span></a>
            <div style="display: flex; align-items: center; gap: 24px;">
                <a href="courses.html" class="nav-back">← Back to Portal</a>
                <button class="btn btn-primary" onclick="window.location.href='checkout.html?service=10x-business-insights&pkg=0&type=course'" style="padding: 10px 20px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; border: none; cursor: pointer;">Enroll Now</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" style="display: none; max-width: 1100px; margin: 0 auto; padding-bottom: 120px;">
            <div id="dynamic-container">
                <!-- Populated dynamically -->
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/courses-data.js"></script>
    <script src="js/ui-utils.js"></script>
    <script>
        const mainContent = document.getElementById('main-content');
        const dynamicContainer = document.getElementById('dynamic-container');

        // Extract ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || '10x-business-insights';
        const course = coursesData[courseId];
        let pkg = course ? course.packages[0] : null;

        firebase.auth().onAuthStateChanged(async (user) => {
            const layout = document.getElementById('dashboard-layout');
            if (layout) layout.classList.remove('auth-loading');
            if (typeof hideAuthLoader === 'function') hideAuthLoader();
        });

        function renderCourseFiverrPackageWidget() {
            const sidebarContainer = document.getElementById('fiverr-package-sidebar');
            if (!sidebarContainer) return;

            sidebarContainer.innerHTML = `
                <div class="fiverr-widget">
                    <div class="fiverr-tabs">
                        <button class="fiverr-tab active" style="cursor: default;">
                            ${pkg.title}
                        </button>
                    </div>
                    <div class="fiverr-widget-body">
                        <div style="background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: #ff4757; margin-bottom: 16px; display: table; letter-spacing: 1px;">🔥 90% OFF - LIMITED FLASH SALE</div>
                        
                        <div class="fiverr-price-row">
                            <div>
                                <span style="font-size: 1.15rem; text-decoration: line-through; color: rgba(255,255,255,0.4); font-weight: 600; margin-right: 8px;">LKR 15,000</span>
                                <span class="fiverr-price" style="color: var(--secondary) !important;">${pkg.price}</span>
                            </div>
                        </div>
                        
                        <div class="fiverr-delivery-badge">
                            ⚡ Lifetime Access & Updates
                        </div>

                        <div style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px;">
                            Get full lifetime access to all 100 growth strategies, active progress dashboard, and interactive action checklist tasks.
                        </div>

                        <button class="fiverr-continue-btn" onclick="window.location.href='checkout.html?service=${course.id}&pkg=0&type=course'">
                            Claim Offer & Enroll Now (${pkg.price})
                        </button>
                    </div>
                </div>
            `;
        }

        if (!course) {
            dynamicContainer.innerHTML = `<h1 style="text-align:center; padding: 100px; color: var(--text-muted); font-weight: 500;">Masterclass not found.</h1>`;
            mainContent.style.display = 'block';
        } else {
            
            // Build Page Layout
            let html = `
                <!-- Two-Column Layout Container -->
                <div class="sales-layout-container" style="padding-top: 40px;">
                    
                    <!-- Left Column: Content -->
                    <div class="sales-left-col">
                        
                        <!-- 1. Hero inside left column -->
                        <div class="sales-hero" style="text-align: left; padding: 0; margin-bottom: 32px;">
                            <h1 class="headline" style="max-width: 100%; margin: 0 0 16px 0; justify-content: flex-start !important; text-align: left;">${course.heroHeadline}</h1>
                            <p class="subheadline" style="font-size: 1.1rem; text-align: left; margin: 0 0 24px 0; max-width: 100%; padding: 0;">${course.description}</p>
                            
                            <div class="benefits-list" style="justify-content: flex-start; margin-bottom: 0;">
                                ${course.benefits.map(b => `
                                    <div class="benefit-item">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                        ${b}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Featured Showcase Video -->
                        <div class="featured-video" style="max-width: 100%; margin: 0 0 48px 0;">
                            <div style="text-align: center; color: rgba(255,255,255,0.8); z-index: 2; position: relative; padding: 24px;">
                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; filter: drop-shadow(0 0 10px rgba(0,163,255,0.4));"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                                <h3 style="font-size: 1.5rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8);">Watch The 10X Framework Preview</h3>
                                <p style="font-size: 0.95rem; color: var(--text-muted); margin-top: 8px; text-shadow: 0 1px 5px rgba(0,0,0,0.8);">Click to watch how we systematically scale business models.</p>
                            </div>
                            <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(180deg, rgba(10,14,23,0.3) 0%, rgba(10,14,23,0.9) 100%), url('https://images.unsplash.com/photo-1557804506-669a67965ba0?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; opacity: 0.4;"></div>
                        </div>

                        <!-- Placeholder for dynamic samples -->
                        <div id="course-samples-container" style="display: none;">
                            <div class="portfolio-section" id="portfolio" style="margin-top: 48px; padding: 0; margin-bottom: 48px;">
                                <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; text-align: left; color: #fff;">Sample Course Material & Video Previews</h2>
                                <p style="text-align: left; color: var(--text-muted); margin-bottom: 32px;">Get a sneak peek inside the premium content before you enroll.</p>
                                <div class="portfolio-gallery">
                                    <!-- Dynamic cards -->
                                </div>
                            </div>
                        </div>

                        <!-- Before / After Comparison -->
                        <div class="comparison-section" style="margin-top: 48px; margin-bottom: 48px;">
                            <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; text-align: left; color: #fff;">Transform Your Business</h2>
                            <p style="color: var(--text-muted); text-align: left; margin-bottom: 32px;">What will happen to your growth curve if you keep doing things the old way vs adopting modern scaling frameworks?</p>
                            
                            <div class="comparison-grid">
                                <div class="comparison-card before" style="margin: 0;">
                                    <h3 style="color: #ff4757; font-size: 1.25rem; margin-bottom: 12px; font-weight: 700;">❌ Without The Strategy</h3>
                                    <p style="color: var(--text-muted); line-height: 1.6; font-size: 0.95rem;">Struggling to find leads, wasting budget on unoptimized social media ads that don't convert, and feeling overwhelmed by generic advice that doesn't apply to local market landscapes.</p>
                                </div>
                                <div class="comparison-card after" style="margin: 0;">
                                    <h3 style="color: var(--secondary); font-size: 1.25rem; margin-bottom: 12px; font-weight: 700;">✅ With 10X Business Insights</h3>
                                    <p style="color: var(--text-muted); line-height: 1.6; font-size: 0.95rem;">Structured, step-by-step blueprints. You'll master niche positioning, implement automated client acquisition and high-converting customer journeys immediately.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Course Syllabus Structure -->
                        <div style="margin: 48px 0;">
                            <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; text-align: left; color: #fff;">Course Curriculum (10 Modules)</h2>
                            <p style="color: var(--text-muted); text-align: left; margin-bottom: 32px;">100 step-by-step blueprints divided into 10 structured, bite-sized sections.</p>
                            
                            <div style="display: flex; flex-direction: column; gap: 16px;">
                                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <h4 style="color: #fff; font-size: 1.1rem; font-weight: 700;">Module 1: The Foundation</h4>
                                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Unfair Advantage & Positioning (10 strategies)</p>
                                    </div>
                                </div>
                                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <h4 style="color: #fff; font-size: 1.1rem; font-weight: 700;">Module 2: Hyper-Retention</h4>
                                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">The Hidden Goldmine of existing clients (10 strategies)</p>
                                    </div>
                                </div>
                                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <h4 style="color: #fff; font-size: 1.1rem; font-weight: 700;">Modules 3-10: Advanced Scaling, Sales Funnels, Ads & Systems</h4>
                                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Unlock 80 remaining blueprints</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- FAQs -->
                        <div class="faq-section" style="margin-bottom: 48px;">
                            <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 32px; text-align: left; color: #fff;">Frequently Asked Questions</h2>
                            <div class="faq-container" style="max-width: 100%; margin: 0 0 48px 0;">
                                ${course.faqs.map(f => `
                                    <div class="faq-item">
                                        <div class="faq-q">${f.q}</div>
                                        <div class="faq-a">${f.a}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Guarantee -->
                        <div class="guarantee-box" style="text-align: left; margin: 0 0 48px 0; padding: 32px;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 24px; color: var(--secondary);">100% Quality Guarantee</h2>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: left; max-width: 100%;">
                                <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Lifetime Access</div>
                                <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Action Checklist Tasks</div>
                                <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Module 1 & 2 Instant Unlock</div>
                                <div style="display: flex; gap: 8px; font-weight: 600; color: #fff;"><span style="color: var(--secondary);">✓</span> Continuous Future Updates</div>
                            </div>
                        </div>

                        <!-- Final Footer elements -->
                        <div style="padding-top: 48px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: rgba(255,255,255,0.3); display: flex; justify-content: space-between; align-items: center;">
                            <div>© MSMEgrowth. All rights reserved.</div>
                            <div style="display: flex; gap: 24px;">
                                <a href="#" style="color: inherit; text-decoration: none;">Terms of Service</a>
                                <a href="#" style="color: inherit; text-decoration: none;">Privacy Policy</a>
                            </div>
                        </div>

                    </div>

                    <!-- Right Column: Fiverr Dynamic Package Widget -->
                    <div class="sales-right-col" id="fiverr-package-sidebar">
                        <!-- Rendered by JS function renderCourseFiverrPackageWidget() -->
                    </div>

                </div>
            `;
            
            dynamicContainer.innerHTML = html;
            renderCourseFiverrPackageWidget();
            mainContent.style.display = 'block';

            // Query configured videos from Firestore
            firebase.firestore().collection('videos').doc(courseId).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    updateCourseVideosOnPage(data);
                }
            }).catch(err => console.error("Error fetching course videos:", err));
        }



        function updateCourseVideosOnPage(data) {
            // Update Sales Video
            if (data.salesVideoUrl) {
                const featuredVideoContainer = document.querySelector('.featured-video');
                if (featuredVideoContainer) {
                    const embedUrl = getGoogleDriveEmbedUrl(data.salesVideoUrl);
                    const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                    
                    // Replace the contents immediately with the iframe and the invisible overlay to block pop-out
                    featuredVideoContainer.innerHTML = `
                        <iframe src="${finalEmbedUrl}" style="position: absolute; top:0; left:0; width:100%; height:100%; border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <!-- Invisible overlay to block Google Drive pop-out button -->
                        <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                    `;
                    // Remove click handler since it autoplays
                    featuredVideoContainer.onclick = null;
                }
            }
            
            // Update Sample Videos
            if (data.samples && data.samples.length > 0) {
                const samplesContainer = document.getElementById('course-samples-container');
                const portfolioGallery = samplesContainer ? samplesContainer.querySelector('.portfolio-gallery') : null;
                if (samplesContainer && portfolioGallery) {
                    let portfolioHtml = '';
                    data.samples.forEach((sample, idx) => {
                        const thumbnailUrl = getGoogleDriveThumbnailUrl(sample.url);
                        const backgroundStyle = thumbnailUrl 
                            ? `background: linear-gradient(180deg, rgba(10, 14, 23, 0.2) 0%, rgba(10, 14, 23, 0.8) 100%), url('${thumbnailUrl}'); background-size: cover; background-position: center;`
                            : 'background: rgba(255, 255, 255, 0.02);';
                        
                        portfolioHtml += `
                            <div class="portfolio-item card glass" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 180px; padding: 0; position: relative; overflow: hidden; transition: all 0.3s; ${backgroundStyle}" onclick="playSampleVideoModal('${sample.title.replace(/'/g, "\\'")}', '${sample.url}')">
                                <div class="play-btn" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; border: 1px solid rgba(255,255,255,0.25); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.4);">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff" style="margin-left: 2px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                </div>
                                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,163,255,0.03); z-index: 1;"></div>
                            </div>
                        `;
                    });
                    portfolioGallery.innerHTML = portfolioHtml;
                    samplesContainer.style.display = 'block';
                }
            }
        }

        function pauseSalesPageVideo() {
            const featuredVideoContainer = document.querySelector('.featured-video');
            if (featuredVideoContainer) {
                const iframe = featuredVideoContainer.querySelector('iframe');
                if (iframe) {
                    let src = iframe.src;
                    if (src.includes('autoplay=1')) {
                        src = src.replace('autoplay=1', 'autoplay=0');
                    } else if (!src.includes('autoplay=')) {
                        src = src + (src.includes('?') ? '&' : '?') + 'autoplay=0';
                    }
                    iframe.src = src;
                }
            }
        }

        function playSampleVideoModal(title, url) {
            pauseSalesPageVideo(); // Pause sales video first
            
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                const embedUrl = getGoogleDriveEmbedUrl(url);
                const finalEmbedUrl = embedUrl + (embedUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                container.innerHTML = `
                    <div style="position: relative; width: 100%; height: 100%; padding: 0; margin: 0; overflow: hidden;">
                        <iframe src="${finalEmbedUrl}" style="width: 100%; height: 100%; border: none; margin: 0; padding: 0; display: block;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <!-- Invisible overlay to block Google Drive pop-out button -->
                        <div style="position: absolute; top:0; right:0; width:100px; height:80px; z-index: 10; background: transparent; cursor: default;"></div>
                    </div>
                `;
                modal.style.display = 'flex';
            }
        }

        function closeVideoPlayerModal() {
            const modal = document.getElementById('videoPlayerModal');
            const container = document.getElementById('modal-video-container');
            if (modal && container) {
                container.innerHTML = '';
                modal.style.display = 'none';
            }
        }

        // Close on clicking outside the modal content
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('videoPlayerModal');
            if (modal) {
                modal.onclick = function(e) {
                    if (e.target === this) {
                        closeVideoPlayerModal();
                    }
                };
            }
        });
    </script>

    <!-- Video Player Modal -->
    <div class="modal-overlay" id="videoPlayerModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); margin: 0; padding: 0;">
        <div style="position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: 0; padding: 0;">
            <button onclick="closeVideoPlayerModal()" style="position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 2rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1010; transition: background 0.3s; line-height: 1;">×</button>
            <div id="modal-video-container" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;"></div>
        </div>
    </div>
</body>
</html>
