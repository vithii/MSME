<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Catalog | MSMEgrowth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px; font-weight: 500; line-height: 1.5; transition: all 0.3s ease;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        .main-view {
            flex-grow: 1;
            margin-left: 260px;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10,10,15,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        /* Fiverr-like Gig Card Layout */
        .services-grid-fiverr {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
        }

        .fiverr-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .fiverr-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 163, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }

        .fiverr-card-cover {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #000;
        }

        .fiverr-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .fiverr-card:hover .fiverr-card-cover img {
            transform: scale(1.05);
        }

        .fiverr-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            z-index: 2;
        }

        .fiverr-card-content {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .fiverr-card-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .avatar-sm {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.75rem;
            color: #fff;
        }

        .author-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
        }

        .level-badge {
            margin-left: auto;
            background: rgba(6, 217, 160, 0.1);
            color: var(--secondary);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fiverr-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.4;
            margin-bottom: 10px;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .fiverr-card:hover .fiverr-card-title {
            color: var(--primary);
        }

        .fiverr-card-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .star-icon {
            color: #FFD700;
        }

        .rating-value {
            color: #fff;
            font-weight: 700;
        }

        .rating-count {
            color: var(--text-muted);
        }

        .fiverr-card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--secondary);
        }

            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="index.html" class="nav-logo" style="margin-bottom: 24px; display: block;">MSME<span style="color: var(--primary);">growth</span></a>
            
            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Active Dashboard
                </a>
                <a href="services.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Service Catalog
                </a>
                <a href="courses.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg> My Masterclasses
                </a>
                <a href="messages.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages 
                </a>
            </nav>

            <a href="#" class="nav-item" style="margin-bottom: 0;" onclick="firebase.auth().signOut().then(() => window.location.href='login.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sign Out
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view">

            <div class="top-bar">
                <div>
                    <h1 style="font-size: 2rem; margin-bottom: 4px; font-weight: 800;" id="welcome-title">Welcome back 👋</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0;">Choose your production package.</p>
                </div>
                
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div style="display: flex; gap: 24px;">
                        <div style="text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 800; color: #fff;" id="active-orders-count">0</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Active Orders</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 800; color: var(--secondary);" id="courses-count">0</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Courses</div>
                        </div>
                    </div>
                    
                    <div style="width: 1px; height: 32px; background: rgba(255,255,255,0.1);"></div>

                    <div class="user-profile">
                        <div style="text-align: right;">
                            <div style="font-weight: 600; font-size: 0.9rem;" id="profile-name">Client Name</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Customer</div>
                        </div>
                        <div class="avatar" id="profile-avatar">C</div>
                    </div>
                </div>
            </div>

            <div id="catalog-container" style="padding: 24px 48px; width: 100%; box-sizing: border-box;">
                <!-- Dynamically populated from JS -->
            </div>

        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/services-data.js"></script>
    
    <script>
        const profileName = document.getElementById('profile-name');
        const profileAvatar = document.getElementById('profile-avatar');

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                if (typeof hideAuthLoader === 'function') hideAuthLoader();
                try {
                    const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.name) {
                            const firstName = userData.name.split(' ')[0];
                            if(profileName) profileName.innerText = userData.name;
                            if(profileAvatar) profileAvatar.innerText = firstName.charAt(0).toUpperCase();
                            
                            const welcomeTitle = document.getElementById('welcome-title');
                            if(welcomeTitle) welcomeTitle.innerHTML = `Welcome back, <span style="color: var(--primary);">${firstName}</span> 👋`;
                        }
                    }

                    // Dynamically calculate counts of Active Orders and Enrolled Courses
                    firebase.firestore().collection('orders').where('clientId', '==', user.uid).get().then(snapshot => {
                        let activeOrders = 0;
                        let courses = 0;
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            if (data.itemType === 'course') {
                                courses++;
                            } else {
                                if (data.status !== 'Completed') {
                                    activeOrders++;
                                }
                            }
                        });
                        const activeOrdersEl = document.getElementById('active-orders-count');
                        const coursesEl = document.getElementById('courses-count');
                        if (activeOrdersEl) activeOrdersEl.innerText = activeOrders;
                        if (coursesEl) coursesEl.innerText = courses;
                    }).catch(err => console.error("Error counting orders:", err));

                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                window.location.href = 'login.html';
            }
        });
        
        // Render Professional Minimal UX
        const container = document.getElementById('catalog-container');
        
        container.innerHTML = `
            <div id="dynamic-catalog"></div>
            
            <div style="text-align: center; margin-top: 60px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size: 1.5rem; color: #FFD700; margin-bottom: 8px;">★★★★★</div>
                <div style="font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 4px;">Trusted by 45+ Businesses</div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">Over 250+ highly profitable assets delivered.</div>
            </div>
        `;

        const dynamicCatalog = document.getElementById('dynamic-catalog');
        
        const categories = [
            {
                title: "Video Services",
                services: [
                    servicesData["ai-presenter"],
                    servicesData["product-ads"],
                    servicesData["cinematic-ads"]
                ]
            },
            {
                title: "Image Services",
                services: [
                    servicesData["static-posts"]
                ]
            }
        ];

        let catalogHtml = '';
        
        categories.forEach(category => {
            catalogHtml += `
                <div style="margin-bottom: 40px;">
                    <h2 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px;">${category.title}</h2>
                    <div class="services-grid-fiverr">
            `;
            
            category.services.forEach(service => {
                if (service) {
                    let imageUrl = '';
                    if (service.id === 'ai-presenter') {
                        imageUrl = 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=600&q=80';
                    } else if (service.id === 'product-ads') {
                        imageUrl = 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80';
                    } else if (service.id === 'cinematic-ads') {
                        imageUrl = 'https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=600&q=80';
                    } else if (service.id === 'static-posts') {
                        imageUrl = 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=600&q=80';
                    }
                    
                    catalogHtml += `
                        <div class="fiverr-card" onclick="window.location.href='service-details.html?id=${service.id}'">
                            <div class="fiverr-card-cover">
                                <img src="${imageUrl}" alt="${service.name}">
                                <div class="fiverr-card-badge">${service.icon}</div>
                            </div>
                            <div class="fiverr-card-content">
                                <h3 class="fiverr-card-title" style="font-size: 1.05rem; font-weight: 700; height: auto; margin-bottom: 6px;">${service.name}</h3>
                                <p style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 12px; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${service.description}</p>
                                <div class="fiverr-card-rating">
                                    <span class="star-icon">★</span>
                                    <span class="rating-value">${service.rating}</span>
                                    <span class="rating-count">(${service.orders} Orders)</span>
                                </div>
                                <div class="fiverr-card-footer">
                                    <span class="price-label">Starting At</span>
                                    <span class="price-value">${service.startingPrice}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            
            catalogHtml += `
                    </div>
                </div>
            `;
        });
        
        dynamicCatalog.innerHTML = catalogHtml;
    </script>
</body>
</html>
