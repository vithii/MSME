<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | MSMEgrowth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            overflow: hidden;
            background: var(--bg-dark);
        }
        
        .dashboard-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--transition-smooth);
            margin-bottom: 8px;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        /* Main View Styling */
        .main-view {
            flex-grow: 1;
            margin-left: 260px;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        /* Project Status Cards */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-pending { background: rgba(254, 202, 87, 0.1); color: #feca57; border: 1px solid rgba(254, 202, 87, 0.3); }
        .status-active { background: rgba(0, 163, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 163, 255, 0.3); }
        .status-action { background: rgba(6, 217, 160, 0.1); color: var(--secondary); border: 1px solid rgba(6, 217, 160, 0.3); }

        .project-card {
            padding: 32px;
            margin-bottom: 24px;
        }

        .progress-track {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            position: relative;
        }

        .progress-track::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 0;
        }

        .progress-step {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            width: 20%;
        }

        .step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .progress-step.completed .step-dot {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0,163,255,0.5);
        }

        .progress-step.active .step-dot {
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(6,217,160,0.4);
        }

        .step-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-step.active .step-label { color: #fff; }

            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            margin-left: 250px !important;
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 0px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout auth-loading" id="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="index.html" class="nav-logo" style="margin-bottom: 24px; display: block;">MSME<span style="color: var(--primary);">growth</span></a>
            
            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Active Dashboard
                </a>
                <a href="services.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Service Catalog
                </a>
                <a href="courses.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg> My Masterclasses
                </a>
                <a href="messages.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages <span style="background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin-left: auto;">2</span>
                </a>
            </nav>

            <a href="#" class="nav-item" style="margin-bottom: 0;" onclick="firebase.auth().signOut().then(() => window.location.href='login.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sign Out
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view">
            
            <div class="top-bar">
                <div>
                    <h1 style="font-size: 2rem; margin-bottom: 4px; font-weight: 800;" id="welcome-title">Welcome back 👋</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0;">Here is the status of your high-stakes assets.</p>
                </div>
                
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div style="display: flex; gap: 24px;">
                        <div style="text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 800; color: #fff;" id="active-orders-count">0</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Active Orders</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 1.2rem; font-weight: 800; color: var(--secondary);" id="courses-count">0</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Courses</div>
                        </div>
                    </div>
                    
                    <div style="width: 1px; height: 32px; background: rgba(255,255,255,0.1);"></div>

                    <div class="user-profile">
                        <div style="text-align: right;">
                            <div style="font-weight: 600; font-size: 0.9rem;" id="profile-name">Client Name</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Customer</div>
                        </div>
                        <div class="avatar" id="profile-avatar">C</div>
                    </div>
                </div>
            </div>

            <div style="padding: 24px 48px; width: 100%; box-sizing: border-box;">
                <!-- Dynamic Projects Container -->
                <div id="projects-container">
                    <!-- Populated by JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase Compat SDKs (For local file:// support) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script>
        // DOM Elements
                            const welcomeTitle = document.getElementById('welcome-title');
                            if(welcomeTitle) welcomeTitle.innerHTML = `Welcome back, <span style="color: var(--primary);">${firstName}</span> 👋`;
                            if(profileName) profileName.innerText = userData.name;
                            if(profileAvatar) profileAvatar.innerText = firstName.charAt(0).toUpperCase();
                        }
                    }

                    // Dynamically calculate counts of Active Orders and Enrolled Courses
                    firebase.firestore().collection('orders').where('clientId', '==', user.uid).get().then(snapshot => {
                        let activeOrders = 0;
                        let courses = 0;
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            if (data.itemType === 'course') {
                                courses++;
                            } else {
                                if (data.status !== 'Completed') {
                                    activeOrders++;
                                }
                            }
                        });
                        const activeOrdersEl = document.getElementById('active-orders-count');
                        const coursesEl = document.getElementById('courses-count');
                        if (activeOrdersEl) activeOrdersEl.innerText = activeOrders;
                        if (coursesEl) coursesEl.innerText = courses;
                    }).catch(err => console.error("Error counting orders:", err));

                } catch (error) {
                    console.error("Error fetching user data:", error);
                }

                // Load dynamic projects from Firestore
                const container = document.getElementById('projects-container');
                firebase.firestore().collection('orders')
                    .where('clientId', '==', user.uid)
                    .onSnapshot((snapshot) => {

                        if (snapshot.empty) {
                            container.innerHTML = `
                                <div class="card glass project-card reveal" style="text-align: center; padding: 64px 24px;">
                                    <div style="font-size: 3rem; margin-bottom: 16px;">📂</div>
                                    <h2 style="font-size: 1.5rem; margin-bottom: 8px;">No Active Projects</h2>
                                    <p style="color: var(--text-muted); margin-bottom: 24px;">You don't have any active projects right now. Browse our service catalog to get started.</p>
                                    <a href="services.html" class="btn btn-primary" style="text-decoration: none;">Browse Services</a>
                                </div>
                            `;
                            return;
                        }

                        let userOrders = [];
                        snapshot.forEach((doc) => {
                            userOrders.push({ id: doc.id, ...doc.data() });
                        });

                        // Sort locally to avoid composite index error
                        userOrders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                        let html = '';
                        userOrders.forEach((order) => {
                            html += `
                            <div class="card glass project-card reveal" style="margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                                    <div>
                                        <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;">Order ID: ${order.orderNum}</div>
                                        <h2 style="font-size: 1.8rem; margin-bottom: 8px;">${order.serviceName}</h2>
                                        <div style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">${order.pkgTitle}</div>
                                    </div>
                                    <span class="status-badge status-pending">${order.status}</span>
                                </div>
                                
                                <p style="color: var(--text-muted); max-width: 600px; margin-bottom: 24px;">Your order has been received. Please click below to enter your project workspace and submit your specific requirements.</p>

                                <button class="btn btn-primary" style="padding: 10px 24px; font-size: 0.85rem; border: none; cursor: pointer; border-radius: 6px; font-weight: 700;" onclick="window.location.href='project.html?service=${order.serviceId}&pkg=${order.pkgIndex}&order=${order.orderNum}&docId=${order.id}'">Enter Workspace →</button>
                            </div>
                            `;
                        });
                        container.innerHTML = html;
                    });
            } else {
                console.log("Not logged in");
                window.location.href = 'login.html';
            }
        });

    </script>
</body>
</html>
