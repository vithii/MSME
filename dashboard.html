<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | MSMEgrowth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
        }
        
        .dashboard-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--transition-smooth);
            margin-bottom: 8px;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        /* Main View Styling */
        .main-view {
            flex-grow: 1;
            margin-left: 260px;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        /* Project Status Cards */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-pending { background: rgba(254, 202, 87, 0.1); color: #feca57; border: 1px solid rgba(254, 202, 87, 0.3); }
        .status-active { background: rgba(0, 163, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 163, 255, 0.3); }
        .status-action { background: rgba(6, 217, 160, 0.1); color: var(--secondary); border: 1px solid rgba(6, 217, 160, 0.3); }

        .project-card {
            padding: 32px;
            margin-bottom: 24px;
        }

        .progress-track {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            position: relative;
        }

        .progress-track::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 0;
        }

        .progress-step {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            width: 20%;
        }

        .step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .progress-step.completed .step-dot {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0,163,255,0.5);
        }

        .progress-step.active .step-dot {
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(6,217,160,0.4);
        }

        .step-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-step.active .step-label { color: #fff; }

            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            margin-left: 250px !important;
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 0px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout auth-loading" id="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="shared-sidebar"></aside>

        <!-- Main Content Area -->
        <main class="main-view">
            
            <div class="top-bar" id="shared-topbar"></div>

            <div style="padding: 24px 48px; width: 100%; box-sizing: border-box;">
                <!-- Dynamic Projects Container -->
                <div id="projects-container">
                    <!-- Populated by JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase Compat SDKs (For local file:// support) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script>
        initSharedLayout('dashboard', 'Here is the status of your high-stakes assets.');

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Load dynamic projects from Firestore
                const container = document.getElementById('projects-container');
                firebase.firestore().collection('orders')
                    .where('clientId', '==', user.uid)
                    .onSnapshot((snapshot) => {

                        if (snapshot.empty) {
                            container.innerHTML = `
                                <div class="card glass project-card reveal" style="text-align: center; padding: 64px 24px;">
                                    <div style="font-size: 3rem; margin-bottom: 16px;">📂</div>
                                    <h2 style="font-size: 1.5rem; margin-bottom: 8px;">No Active Projects</h2>
                                    <p style="color: var(--text-muted); margin-bottom: 24px;">You don't have any active projects right now. Browse our service catalog to get started.</p>
                                    <a href="services.html" class="btn btn-primary" style="text-decoration: none;">Browse Services</a>
                                </div>
                            `;
                            return;
                        }

                        let userOrders = [];
                        snapshot.forEach((doc) => {
                            userOrders.push({ id: doc.id, ...doc.data() });
                        });

                        // Sort locally to avoid composite index error
                        userOrders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                        let html = '';
                        userOrders.forEach((order) => {
                            html += `
                            <div class="card glass project-card reveal" style="margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                                    <div>
                                        <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;">Order ID: ${order.orderNum}</div>
                                        <h2 style="font-size: 1.8rem; margin-bottom: 8px;">${order.serviceName}</h2>
                                        <div style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">${order.pkgTitle}</div>
                                    </div>
                                    <span class="status-badge status-pending">${order.status}</span>
                                </div>
                                
                                <p style="color: var(--text-muted); max-width: 600px; margin-bottom: 24px;">Your order has been received. Please click below to enter your project workspace and submit your specific requirements.</p>

                                <button class="btn btn-primary" style="padding: 10px 24px; font-size: 0.85rem; border: none; cursor: pointer; border-radius: 6px; font-weight: 700;" onclick="window.location.href='project.html?service=${order.serviceId}&pkg=${order.pkgIndex}&order=${order.orderNum}&docId=${order.id}'">Enter Workspace →</button>
                            </div>
                            `;
                        });
                        container.innerHTML = html;
                    });
            } else {
                console.log("Not logged in");
                window.location.href = 'login.html';
            }
        });

    </script>
</body>
</html>
