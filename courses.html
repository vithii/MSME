<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Library | MSMEgrowth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-dark);
        }

        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px; font-weight: 500; line-height: 1.5; transition: all 0.3s ease;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        .main-view {
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 32px;
            padding-bottom: 120px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .course-card {
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease, border-color 0.4s ease;
        }
        
        .course-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 163, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 163, 255, 0.1);
        }

        .course-image {
            height: 200px;
            background: linear-gradient(135deg, rgba(0,163,255,0.2) 0%, rgba(6,217,160,0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout auth-loading" id="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="index.html" class="nav-logo" style="margin-bottom: 24px; display: block;">MSME<span style="color: var(--primary);">growth</span></a>
            
            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Active Dashboard
                </a>
                <a href="services.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Service Catalog
                </a>
                <a href="courses.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg> My Masterclasses
                </a>
                <a href="messages.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages 
                </a>
            </nav>

            <a href="#" class="nav-item" style="margin-bottom: 0;" onclick="firebase.auth().signOut().then(() => window.location.href='login.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sign Out
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view">
            
            <div class="top-bar">
                <div>
                    <h1 style="font-size: 26px; font-weight: 600; line-height: 1.3; margin-bottom: 8px;">Masterclass <span class="text-gradient">Library</span></h1>
                    <p class="text-muted">Access your enrolled courses and premium learning material.</p>
                </div>
                <div class="user-profile">
                    <div style="text-align: right;">
                        <div style="font-weight: 700;" id="profile-name">Client Name</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">Customer</div>
                    </div>
                    <div class="avatar" id="profile-avatar">C</div>
                </div>
            </div>

            <div class="grid" id="courses-container">
                <!-- Dynamic cards rendered by JS -->
            </div>

        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script>
        const profileName = document.getElementById('profile-name');
        const profileAvatar = document.getElementById('profile-avatar');
        const coursesContainer = document.getElementById('courses-container');

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                const layout = document.getElementById('dashboard-layout');
                if (layout) layout.classList.remove('auth-loading');
                if (typeof hideAuthLoader === 'function') hideAuthLoader();
                try {
                    const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.name) {
                            const firstName = userData.name.split(' ')[0];
                            if(profileName) profileName.innerText = userData.name;
                            if(profileAvatar) profileAvatar.innerText = firstName.charAt(0).toUpperCase();
                        }
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }

                // Query course purchase order status dynamically
                const courseId = "10x-business-insights";
                firebase.firestore().collection('orders')
                    .where('clientId', '==', user.uid)
                    .where('serviceId', '==', courseId)
                    .onSnapshot((snapshot) => {
                        let statusText = "Not Enrolled";
                        let statusColor = "var(--text-muted)";
                        let buttonText = "Get Lifetime Access (LKR 1,500)";
                        let buttonLink = `course-details.html?id=${courseId}`;
                        let isOwned = false;

                        if (!snapshot.empty) {
                            let activeOrder = null;
                            snapshot.forEach(doc => {
                                const order = doc.data();
                                // Completed or Active order is preferred
                                if (order.status === 'Completed' || order.status === 'Active') {
                                    activeOrder = order;
                                } else if (!activeOrder) {
                                    activeOrder = order; // Fallback to pending
                                }
                            });

                            if (activeOrder) {
                                isOwned = true;
                                if (activeOrder.status === 'Completed' || activeOrder.status === 'Active') {
                                    statusText = "Owned";
                                    statusColor = "var(--secondary)";
                                    buttonText = "Enter Masterclass";
                                    buttonLink = "course.html";
                                } else if (activeOrder.status === 'Pending Verification') {
                                    statusText = "Pending Verification";
                                    statusColor = "#feca57";
                                    buttonText = "Enter Masterclass (2 Modules)";
                                    buttonLink = "course.html";
                                }
                            }
                        }

                        coursesContainer.innerHTML = `
                            <div class="card glass course-card" style="max-width: 380px;">
                                <div class="course-image" style="height: 120px; font-size: 2.5rem;">🚀</div>
                                <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column;">
                                    <div style="font-size: 0.8rem; color: ${statusColor}; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;">${statusText}</div>
                                    <h2 style="font-size: 1.35rem; margin-bottom: 8px; color: #fff;">10X Business Insights</h2>
                                    <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.85rem; line-height: 1.5; flex-grow: 1;">
                                        Learn 100 practical growth strategies to dominate your market. This interactive masterclass guides you through hyper-retention, scalable foundations, and market positioning.
                                    </p>
                                    <a href="${buttonLink}" class="btn btn-primary" style="text-align: center; width: 100%; padding: 10px 16px; font-size: 0.85rem;">${buttonText}</a>
                                </div>
                            </div>
                        `;
                    });

            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
