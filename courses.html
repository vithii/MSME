<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Library | MSMEgrowth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-dark);
        }

        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px; font-weight: 500; line-height: 1.5; transition: all 0.3s ease;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        /* Main View Styling */
        .main-view {
            flex-grow: 1;
            margin-left: 260px;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            height: 100vh;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }
        
        /* Fiverr-like Gig Card Layout */
        .services-grid-fiverr {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
        }

        .fiverr-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .fiverr-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 163, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 163, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }

        .fiverr-card-cover {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #000;
        }

        .fiverr-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .fiverr-card:hover .fiverr-card-cover img {
            transform: scale(1.05);
        }

        .fiverr-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            z-index: 2;
        }

        .fiverr-card-content {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .level-badge {
            margin-left: 0;
            background: rgba(6, 217, 160, 0.1);
            color: var(--secondary);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fiverr-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.4;
            margin-bottom: 10px;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .fiverr-card:hover .fiverr-card-title {
            color: var(--primary);
        }

        .fiverr-card-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .star-icon {
            color: #FFD700;
        }

        .rating-value {
            color: #fff;
            font-weight: 700;
        }

        .rating-count {
            color: var(--text-muted);
        }

        .fiverr-card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--secondary);
        }
            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            margin-left: 250px !important;
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout auth-loading" id="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="shared-sidebar"></aside>

        <!-- Main Content Area -->
        <main class="main-view">
            
            <div class="top-bar" id="shared-topbar"></div>

            <div style="padding: 24px 48px; width: 100%; box-sizing: border-box;">
                <div class="services-grid-fiverr" id="courses-container">
                    <!-- Dynamic cards rendered by JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/courses-data.js"></script>
    <script>
        initSharedLayout('courses', 'Access your enrolled courses and premium learning material.');

        const coursesContainer = document.getElementById('courses-container');

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {

                // Query course purchase order status dynamically
                firebase.firestore().collection('orders')
                    .where('clientId', '==', user.uid)
                    .where('itemType', '==', 'course')
                    .onSnapshot((snapshot) => {
                        const userCourseOrders = {};
                        snapshot.forEach(doc => {
                            const order = doc.data();
                            userCourseOrders[order.serviceId] = order;
                        });

                        let coursesHtml = '';
                        Object.keys(coursesData).forEach(courseId => {
                            const course = coursesData[courseId];
                            const order = userCourseOrders[courseId];
                            
                            let statusText = "Not Enrolled";
                            let statusColor = "var(--text-muted)";
                            let buttonLink = `course-details.html?id=${courseId}`;
                            
                            if (order) {
                                if (order.status === 'Completed' || order.status === 'Active') {
                                    statusText = "Enrolled";
                                    statusColor = "var(--secondary)";
                                    buttonLink = "course.html";
                                } else if (order.status === 'Pending Verification') {
                                    statusText = "Pending Approval";
                                    statusColor = "#feca57";
                                    buttonLink = "course.html";
                                }
                            }

                            const imageUrl = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80';

                            coursesHtml += `
                                <div class="fiverr-card" onclick="window.location.href='${buttonLink}'">
                                    <div class="fiverr-card-cover">
                                        <img src="${imageUrl}" alt="${course.name}">
                                        <div class="fiverr-card-badge">${course.icon}</div>
                                    </div>
                                    <div class="fiverr-card-content">
                                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                            <span class="level-badge" style="background: rgba(255, 255, 255, 0.05); color: ${statusColor}; border: 1px solid rgba(255, 255, 255, 0.05); font-weight: 700; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase;">${statusText}</span>
                                        </div>
                                        <h3 class="fiverr-card-title" style="font-size: 1.05rem; font-weight: 700; height: auto; margin-bottom: 6px;">${course.name}</h3>
                                        <p style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 12px; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${course.description}</p>
                                        <div class="fiverr-card-rating">
                                            <span class="star-icon">★</span>
                                            <span class="rating-value">${course.rating}</span>
                                            <span class="rating-count">(${course.orders} Learners)</span>
                                        </div>
                                        <div class="fiverr-card-footer">
                                            <span class="price-label">Starting At</span>
                                            <span class="price-value">${course.startingPrice}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });

                        coursesContainer.innerHTML = coursesHtml;
                    });

            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
