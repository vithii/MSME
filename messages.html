<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | MSMEgrowth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
        }
        
        .dashboard-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: rgba(10, 14, 23, 0.95);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--transition-smooth);
            margin-bottom: 8px;
        }

        .nav-icon {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 3px solid var(--primary);
            background: rgba(0, 163, 255, 0.05);
        }

        /* Main View Styling */
        .main-view {
            flex-grow: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 32px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }

        /* Chat Interface */
        .chat-container {
            display: flex;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-threads {
            width: 320px;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            background: rgba(10, 14, 23, 0.6);
        }
        
        .thread-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .thread-item:hover, .thread-item.active {
            background: rgba(255,255,255,0.05);
        }
        
        .thread-title {
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        
        .thread-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-window {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            background: rgba(10, 14, 23, 0.4);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-msg {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .chat-msg.admin {
            background: rgba(255,255,255,0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-msg.user {
            background: var(--primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 16px;
            background: rgba(10, 14, 23, 0.4);
        }

        .chat-input {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 163, 255, 0.3);
        }

            /* Dynamic Compact Realignment Overrides (Desktop & Mobile) */
        .sidebar {
            width: 250px !important;
        }
        .main-view {
            padding: 24px !important;
        }
        .top-bar {
            margin-bottom: 16px !important;
        }
        .project-card, .card, .glass, .course-card {
            padding: 16px !important;
        }
        .grid, .services-grid, .comparison-grid {
            gap: 12px !important;
        }
        h1, .h1 {
            font-size: 20px !important;
            font-weight: 700 !important;
            line-height: 1.25 !important;
        }
        h2, .h2 {
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
        }
        .nav-item {
            font-size: 13px !important;
            padding: 8px 12px !important;
        }
        .btn, .btn-sales, .btn-primary {
            padding: 10px 20px !important;
            font-size: 0.85rem !important;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px !important;
            }
            .main-view {
                padding: 16px !important;
                margin-left: 0 !important;
            }
            .top-bar {
                padding: 16px !important;
                margin-bottom: 12px !important;
            }
            .project-card, .card, .glass, .course-card {
                padding: 14px !important;
            }
            .grid, .services-grid, .comparison-grid {
                gap: 10px !important;
            }
            h1, .h1 {
                font-size: 18px !important;
            }
            h2, .h2 {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="index.html" class="nav-logo" style="margin-bottom: 24px; display: block;">MSME<span style="color: var(--primary);">growth</span></a>
            
            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Active Dashboard
                </a>
                <a href="services.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Service Catalog
                </a>
                <a href="courses.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg> My Masterclasses
                </a>
                <a href="messages.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages 
                </a>
            </nav>

            <a href="#" class="nav-item" style="margin-bottom: 0;" onclick="firebase.auth().signOut().then(() => window.location.href='login.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; flex-shrink: 0;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sign Out
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view">
            
            <div class="top-bar">
                <div>
                    <h1 style="font-size: 2rem; margin-bottom: 8px;">Message Center</h1>
                    <p class="text-muted">Communicate directly with your account managers and production team.</p>
                </div>
                <div class="user-profile">
                    <div style="text-align: right;">
                        <div style="font-weight: 700;">Client Portal</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">Verified Account</div>
                    </div>
                    <div class="avatar">C</div>
                </div>
            </div>

            <div class="chat-container">
                
                <div class="chat-threads">
                    <div style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; color: var(--text-muted);">
                        Recent Conversations
                    </div>
                    
                    <div class="thread-item active">
                        <div class="thread-title">
                            Support Team 
                            <span style="background: var(--primary); color: white; padding: 2px 6px; border-radius: 8px; font-size: 0.65rem;">New</span>
                        </div>
                        <div class="thread-preview">Hi there! How can we help you today?</div>
                    </div>
                    <div id="dynamic-threads">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="chat-window">
                    <div class="chat-header">
                        Support Team
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <!-- Populated by JS -->
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button class="btn-send" onclick="sendMessage()">Send</button>
                    </div>
                </div>

            </div>

        </main>
    </div>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script>
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                if (typeof hideAuthLoader === 'function') hideAuthLoader();
                loadDynamicThreads();
                initSupportChat();
            }
        });

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;

            input.value = '';
            const user = firebase.auth().currentUser;
            if(!user) return;
            
            try {
                // Ensure a thread document exists for the user
                const threadRef = firebase.firestore().collection('support_threads').doc(user.uid);
                await threadRef.set({
                    clientEmail: user.email,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                // Add the message
                await threadRef.collection('messages').add({
                    text: msg,
                    senderId: user.uid,
                    senderName: user.displayName || 'Client',
                    isAdmin: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error("Error sending message:", error);
            }
        }
        
        let unsubscribeSupport = null;
        function initSupportChat() {
            const user = firebase.auth().currentUser;
            if(!user) return;
            
            const chatBox = document.getElementById('chat-messages');
            if (unsubscribeSupport) unsubscribeSupport();
            
            unsubscribeSupport = firebase.firestore().collection('support_threads').doc(user.uid).collection('messages')
                .orderBy('createdAt', 'asc')
                .onSnapshot((snapshot) => {
                    chatBox.innerHTML = '';
                    if (snapshot.empty) {
                        chatBox.innerHTML = `
                            <div class="chat-msg admin">Hello! Welcome to MSMEgrowth. If you have any questions about our services or need help with a payment, let us know!</div>
                            <div class="chat-msg admin">Our team usually replies within a few minutes.</div>
                        `;
                        return;
                    }
                    
                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const roleClass = msg.isAdmin ? 'admin' : 'user';
                        chatBox.innerHTML += `<div class="chat-msg ${roleClass}">${msg.text}</div>`;
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
        }

        function loadDynamicThreads() {
            const container = document.getElementById('dynamic-threads');
            const user = firebase.auth().currentUser;
            if (!user) return;
            
            firebase.firestore().collection('orders')
                .where('clientId', '==', user.uid)
                .onSnapshot((snapshot) => {
                    let userOrders = [];
                    snapshot.forEach((doc) => {
                        userOrders.push({ id: doc.id, ...doc.data() });
                    });
                    
                    userOrders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                    let html = '';
                    userOrders.forEach((order) => {
                        html += `
                            <div class="thread-item" onclick="window.location.href='project.html?service=${order.serviceId}&pkg=${order.pkgIndex}&order=${order.orderNum}&docId=${order.id}'">
                                <div class="thread-title">
                                    Project ${order.orderNum}
                                </div>
                                <div class="thread-preview">Click to open project workspace chat.</div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                });
        }
    </script>
</body>
</html>
